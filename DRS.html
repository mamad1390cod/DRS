<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>برنامه ریزی درسی</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:tahoma;
}

body{
    background:#0f172a;
    color:white;
    padding:25px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:38px;
    margin-bottom:30px;
    font-weight:bold;
}

.days{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.day{
    background:#111827;
    border-radius:25px;
    padding:18px;
}

.day h2{
    text-align:center;
    margin-bottom:18px;
    color:#38bdf8;
}

.blocks{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.block{
    background:#334155;
    border-radius:18px;
    min-height:110px;
    padding:10px;
    cursor:pointer;
    transition:0.2s;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    border:2px solid transparent;
}

.block:hover{
    transform:scale(1.03);
}

.block.done{
    background:#16a34a;
    border-color:#86efac;
}

.lesson{
    font-size:17px;
    font-weight:bold;
    margin-bottom:8px;
}

.time{
    font-size:14px;
}

.empty{
    opacity:0.6;
}

.stats{
    margin-top:35px;
    background:#111827;
    border-radius:25px;
    padding:25px;
}

.stats h2{
    margin-bottom:15px;
    color:#38bdf8;
}

.stat-box{
    line-height:2;
    font-size:18px;
}

.progress-bar{
    width:100%;
    height:28px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:15px;
}

.progress{
    height:100%;
    width:0%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    transition:0.3s;
}

.reset-btn{
    margin-top:20px;
    background:#ef4444;
    border:none;
    color:white;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

</style>
</head>
<body>

<div class="container">

    <div class="title">
        برنامه ریزی درسی
    </div>

    <div class="days" id="daysContainer"></div>

    <div class="stats">

        <h2>آمار پیشرفت</h2>

        <div class="stat-box">
            <div>کل برنامه ها: <span id="totalTasks">0</span></div>
            <div>تکمیل شده ها: <span id="completedTasks">0</span></div>
            <div>کل زمان مطالعه: <span id="studyTime">0</span></div>
        </div>

        <div class="progress-bar">
            <div class="progress" id="progressBar">0%</div>
        </div>

        <button class="reset-btn" onclick="resetAll()">
            حذف همه برنامه ها
        </button>

    </div>

</div>

<script>

const weekDays = [
    "شنبه",
    "یکشنبه",
    "دوشنبه",
    "سه شنبه",
    "چهارشنبه",
    "پنجشنبه",
    "جمعه"
];

const container = document.getElementById("daysContainer");

let savedData = JSON.parse(localStorage.getItem("studyPlanner")) || [];

function saveData(){
    localStorage.setItem("studyPlanner", JSON.stringify(savedData));
}

function createUI(){

    container.innerHTML = "";

    weekDays.forEach((day, dayIndex) => {

        const dayBox = document.createElement("div");
        dayBox.className = "day";

        const title = document.createElement("h2");
        title.innerText = day;

        const blocks = document.createElement("div");
        blocks.className = "blocks";

        for(let i = 0; i < 6; i++){

            const block = document.createElement("div");
            block.className = "block";

            const found = savedData.find(
                item => item.day === dayIndex && item.block === i
            );

            if(found){

                block.classList.add("done");

                block.innerHTML = `
                    <div class="lesson">✅ ${found.lesson}</div>
                    <div class="time">⏰ ${found.time}</div>
                `;

            }else{

                block.innerHTML = `
                    <div class="empty">+ اضافه کردن درس</div>
                `;
            }

            block.addEventListener("click", () => {

                const existingIndex = savedData.findIndex(
                    item => item.day === dayIndex && item.block === i
                );

                // حذف
                if(existingIndex !== -1){

                    if(confirm("میخوای حذفش کنی؟")){

                        savedData.splice(existingIndex,1);

                        saveData();

                        createUI();

                        updateStats();
                    }

                    return;
                }

                // اضافه کردن
                const lesson = prompt("اسم درس:");

                if(!lesson) return;

                const time = prompt("زمان مطالعه:");

                savedData.push({
                    day: dayIndex,
                    block: i,
                    lesson: lesson,
                    time: time
                });

                saveData();

                createUI();

                updateStats();

            });

            blocks.appendChild(block);

        }

        dayBox.appendChild(title);

        dayBox.appendChild(blocks);

        container.appendChild(dayBox);

    });

}

function updateStats(){

    const total = 7 * 6;

    const completed = savedData.length;

    document.getElementById("totalTasks").innerText = total;

    document.getElementById("completedTasks").innerText = completed;

    let percent = Math.round((completed / total) * 100);

    document.getElementById("progressBar").style.width = percent + "%";

    document.getElementById("progressBar").innerText = percent + "%";

    let totalTime = 0;

    savedData.forEach(item => {

        let num = parseFloat(item.time);

        if(!isNaN(num)){
            totalTime += num;
        }

    });

    document.getElementById("studyTime").innerText = totalTime;

}

function resetAll(){

    if(confirm("همه برنامه ها حذف بشن؟")){

        savedData = [];

        saveData();

        createUI();

        updateStats();

    }

}

createUI();

updateStats();

</script>

</body>
</html>
